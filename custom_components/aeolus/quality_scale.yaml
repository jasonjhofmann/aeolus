# Aeolus quality-scale tracker. PLATINUM: every Bronze + Silver + Gold + Platinum
# rule is done or exempt (strict-typing done; async-dependency and inject-websession
# are N/A for a dependency-free, HTTP-free integration).
# Status values: done | todo | exempt(+comment). Reference: core `airgradient`.
rules:
  # --- Bronze ---
  action-setup: done
  appropriate-polling:
    status: exempt
    comment: |
      Push-based calculated helper; derives state from source-entity events
      and does not poll.
  brands:
    status: done
    comment: |
      Satisfied by the in-package custom_components/aeolus/brand/ folder
      (icon/logo + @2x + dark variants). Do NOT submit a home-assistant/brands
      PR — as of HA 2026.3.0 that repo auto-closes new custom-integration PRs;
      custom integrations ship brand assets in-tree (served via the Brands Proxy).
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure:
    status: exempt
    comment: |
      No external device/service to verify at config time; the integration
      composes existing HA entities and entity selectors constrain input.
  test-before-setup:
    status: exempt
    comment: |
      No external dependency whose absence blocks setup. Missing/unavailable
      source entities are handled per-entity (entity-unavailable), not by
      failing setup.
  unique-config-entry: done

  # --- Silver (target) ---
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: This integration does not require authentication.
  test-coverage: done

  # --- Gold (architected toward) ---
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: |
      Composes existing Home Assistant entities; no network device to discover.
  discovery-update-info:
    status: exempt
    comment: Not discoverable; nothing to update from discovery.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices: done
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues: done
  stale-devices: done

  # --- Platinum (architected toward) ---
  async-dependency:
    status: exempt
    comment: |
      No external dependency library; all logic is in-process and async-native.
  inject-websession:
    status: exempt
    comment: This integration does not make any HTTP requests.
  strict-typing: done
