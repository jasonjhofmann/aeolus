# Aeolus quality-scale tracker. Target: Silver; architected for Platinum.
# Status values: done | todo | exempt(+comment). Reference: core `airgradient`.
rules:
  # --- Bronze ---
  action-setup: done
  appropriate-polling:
    status: exempt
    comment: |
      Push-based calculated helper; derives state from source-entity events
      and does not poll.
  brands: todo
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: todo
  test-before-setup: todo
  unique-config-entry: done

  # --- Silver (target) ---
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: todo
  integration-owner: done
  log-when-unavailable: todo
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: This integration does not require authentication.
  test-coverage: todo

  # --- Gold (architected toward) ---
  devices: done
  diagnostics: todo
  discovery:
    status: exempt
    comment: |
      Composes existing Home Assistant entities; no network device to discover.
  discovery-update-info:
    status: exempt
    comment: Not discoverable; nothing to update from discovery.
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices: todo
  entity-category: todo
  entity-device-class: done
  entity-disabled-by-default: todo
  entity-translations: todo
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow: done
  repair-issues: todo
  stale-devices: todo

  # --- Platinum (architected toward) ---
  async-dependency:
    status: exempt
    comment: |
      No external dependency library; all logic is in-process and async-native.
  inject-websession:
    status: exempt
    comment: This integration does not make any HTTP requests.
  strict-typing: todo
